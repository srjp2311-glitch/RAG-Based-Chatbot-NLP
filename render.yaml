services:
  - type: web
    name: deforestation-rag-bot
    env: python
    region: ohio
    plan: free # Update to 'starter' if you require more RAM for BERT models
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: TRANSFORMERS_CACHE
        value: /tmp
      - key: HF_HOME
        value: /tmp
